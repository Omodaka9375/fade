name: nightly quality gate

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC daily
  workflow_dispatch:

jobs:
  quality:
    name: quality gate (Qwen2.5-0.5B)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,eval]"
      - name: Download model
        run: |
          python -c "
          from transformers import AutoModelForCausalLM, AutoTokenizer
          AutoModelForCausalLM.from_pretrained('Qwen/Qwen2.5-0.5B-Instruct')
          AutoTokenizer.from_pretrained('Qwen/Qwen2.5-0.5B-Instruct')
          "
      - name: Divergence benchmark
        run: |
          python benchmarks/divergence.py --max-tokens 64 --csv divergence.csv
      - name: Needle test (512 tokens)
        run: |
          python -c "
          import torch
          from fade.patch import load_model
          from fade.eval.needle import run_needle
          model, tokenizer = load_model(
              'Qwen/Qwen2.5-0.5B-Instruct',
              device_map='cpu', dtype=torch.float32, attn_impl='eager',
          )
          r = run_needle(model, tokenizer, target_tokens=512, device='cpu')
          print(r)
          print(f'Needle: {"PASS" if r["passed"] else "FAIL"}')
          "
      - name: Perplexity gate
        run: |
          python -c "
          import torch
          from fade.patch import load_model
          from fade.eval.perplexity import perplexity
          model, tokenizer = load_model(
              'Qwen/Qwen2.5-0.5B-Instruct',
              device_map='cpu', dtype=torch.float32, attn_impl='sdpa',
          )
          text = 'The history of caching spans decades. ' * 50
          ppl = perplexity(model, tokenizer, text, max_length=256, stride=128, device='cpu')
          print(f'PPL: {ppl:.2f}')
          assert ppl < 50.0, f'PPL too high: {ppl}'
          print('PPL gate PASSED')
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-results
          path: divergence.csv
